# ros_gz_bridge parameter_bridge config — two-robot fleet
# Gazebo topics are prefixed /robot_N/* to avoid collision in the shared world.
# The Zenoh bridge in each nav2 pod strips the /robot_N prefix so SLAM/Nav2
# see bare /scan, /odom, /cmd_vel on their local DDS domain.

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# ── Robot 1 ────────────────────────────────────────────────────────────────────
- ros_topic_name: "/robot_1/scan"
  gz_topic_name: "/robot_1/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_1/odom"
  gz_topic_name: "/robot_1/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_1/imu"
  gz_topic_name: "/robot_1/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_1/joint_states"
  gz_topic_name: "/robot_1/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_1/cmd_vel"
  gz_topic_name: "/robot_1/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# ── Robot 2 ────────────────────────────────────────────────────────────────────
- ros_topic_name: "/robot_2/scan"
  gz_topic_name: "/robot_2/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_2/odom"
  gz_topic_name: "/robot_2/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_2/imu"
  gz_topic_name: "/robot_2/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_2/joint_states"
  gz_topic_name: "/robot_2/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

- ros_topic_name: "/robot_2/cmd_vel"
  gz_topic_name: "/robot_2/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ
