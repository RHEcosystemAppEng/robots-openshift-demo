metadata:
  name: zenoh-router
  namespace: robot-demo
  labels:
    app: zenoh-router
    app.kubernetes.io/name: robot-demo
spec:
  selector:
    app: zenoh-router
  ports:
    - name: zenoh
      port: 7447
      targetPort: 7447
      protocol: TCP
  type: ClusterIP
