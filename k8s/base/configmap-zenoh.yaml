apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-config
  namespace: robot-demo
  labels:
    app.kubernetes.io/name: robot-demo
data:
  zenoh-router.json5: |
    {
      mode: "router",
      listen: { endpoints: ["tcp/0.0.0.0:7447"] },
      scouting: {
        multicast: { enabled: false },
        gossip: { enabled: true }
      }
    }

  # Gazebo pod: routes /robot_N/* sensor topics from ros_gz_bridge.
  # Allow filter keeps only sensor+cmd_vel topics to avoid Nav2 announcement floods.
  zenoh-gazebo.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Nav2 pods: NO allow filter so ALL topic subscriptions (from topic_relay.py
  # and early route-holder echo processes) are detected and Zenoh routes established
  # regardless of startup timing.
  zenoh-nav2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } }
    }

  zenoh-gazebo-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-gazebo-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Nav2 per-robot configs: no allow filter (same reason as zenoh-nav2.json5)
  zenoh-nav2-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } }
    }

  zenoh-nav2-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } }
    }

  # Viz pod: no allow filter — routes all /robot_N/* subscriptions from
  # tf_relay.py regardless of startup timing.
  zenoh-viz.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } }
    }
