apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-config
  namespace: robot-demo
  labels:
    app.kubernetes.io/name: robot-demo
data:
  zenoh-router.json5: |
    {
      mode: "router",
      listen: { endpoints: ["tcp/0.0.0.0:7447"] },
      scouting: {
        multicast: { enabled: false },
        gossip: { enabled: true }
      }
    }

  # Gazebo pod: routes /robot_N/* topics between Gazebo and nav2 pods
  zenoh-gazebo.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^/(robot_[12]/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Nav2 pod (base / robot_1): topic_relay.py inside the pod bridges /robot_1/* ↔ bare topics.
  # No ros_namespace — not supported in zenoh-bridge-ros2dds 1.9.0.
  zenoh-nav2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^/(robot_1/(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|robot_description)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Per-robot Gazebo config — same as base (shared Gazebo pod, one world)
  zenoh-gazebo-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^/(robot_[12]/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-gazebo-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^/(robot_[12]/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Per-robot Nav2 configs — no ros_namespace, explicit /robot_N/* allow filter
  zenoh-nav2-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^/(robot_1/(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|robot_description)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-nav2-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^/(robot_2/(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|robot_description)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Viz pod: receives /robot_N/* topics; tf_relay.py merges TF into /tf for RViz
  zenoh-viz.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^/(robot_[12]/(map|scan|tf|tf_static|plan|robot_description)|clock|ros_discovery_info|rosout)$"
        }
      }
    }
