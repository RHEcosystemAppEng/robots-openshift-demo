apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-config
  namespace: robot-demo
  labels:
    app.kubernetes.io/name: robot-demo
data:
  zenoh-router.json5: |
    {
      mode: "router",
      listen: {
        endpoints: ["tcp/0.0.0.0:7447"]
      },
      scouting: {
        multicast: { enabled: false },
        gossip: { enabled: true }
      }
    }
  zenoh-gazebo.json5: |
    {
      mode: "client",
      connect: {
        endpoints: ["tcp/zenoh-router:7447"]
      },
      scouting: {
        multicast: { enabled: false }
      },
      plugins: {
        ros2dds: {
          allow: "^(scan|odom|tf|tf_static|clock|imu|joint_states|cmd_vel|ros_discovery_info|rosout)$"
        }
      }
    }
  zenoh-nav2.json5: |
    {
      mode: "client",
      connect: {
        endpoints: ["tcp/zenoh-router:7447"]
      },
      scouting: {
        multicast: { enabled: false }
      }
    }
  zenoh-gazebo-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: { ros2dds: { ros_namespace: "/robot_1" } }
    }
  zenoh-gazebo-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: { ros2dds: { ros_namespace: "/robot_2" } }
    }
  zenoh-nav2-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: { ros2dds: { ros_namespace: "/robot_1" } }
    }
  zenoh-nav2-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: { ros2dds: { ros_namespace: "/robot_2" } }
    }
