apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-config
  namespace: robot-demo
  labels:
    app.kubernetes.io/name: robot-demo
data:
  zenoh-router.json5: |
    {
      mode: "router",
      listen: { endpoints: ["tcp/0.0.0.0:7447"] },
      scouting: {
        multicast: { enabled: false },
        gossip: { enabled: true }
      }
    }

  # Gazebo pod: no namespace; routes /robot_N/* topics from ros_gz_bridge
  zenoh-gazebo.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^(robot_[12]/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Nav2 pod (base/robot_1): namespace adds /robot_1 prefix when bridging to Zenoh,
  # so SLAM/Nav2 see bare /scan, /odom, /map etc. locally while Zenoh carries /robot_1/*.
  zenoh-nav2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          namespace: "/robot_1",
          allow: "^(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-gazebo-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^(robot_[12]/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-gazebo-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^(robot_[12]/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-nav2-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          namespace: "/robot_1",
          allow: "^(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-nav2-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          namespace: "/robot_2",
          allow: "^(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Viz pod: no namespace; receives /robot_N/* from Zenoh as-is for RViz + tf_relay
  zenoh-viz.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^(robot_[12]/(map|scan|tf|tf_static|plan|robot_description)|clock|ros_discovery_info|rosout)$"
        }
      }
    }
