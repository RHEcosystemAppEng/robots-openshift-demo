apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-config
  namespace: robot-demo
  labels:
    app.kubernetes.io/name: robot-demo
data:
  zenoh-router.json5: |
    {
      mode: "router",
      listen: { endpoints: ["tcp/0.0.0.0:7447"] },
      scouting: {
        multicast: { enabled: false },
        gossip: { enabled: true }
      }
    }

  # Gazebo pod: no namespace; ros_gz_bridge publishes /robot_N/* topics directly.
  # Allow filter uses explicit alternation — [12] char class not supported by Zenoh regex.
  zenoh-gazebo.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Nav2 pod (base/robot_1): NO namespace (Zenoh 1.9.0 namespace is outbound-only).
  # topic_relay.py inside the pod bridges /robot_N/* ↔ bare topics:
  #   inbound:  /robot_1/scan   → /scan   (for SLAM)
  #   outbound: /tf, /map, etc. → /robot_1/tf, /robot_1/map (for viz)
  #             /cmd_vel        → /robot_1/cmd_vel (for Gazebo)
  zenoh-nav2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|robot_description|goal_pose)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-gazebo-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-gazebo-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-nav2-robot-1.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|robot_description|goal_pose)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  zenoh-nav2-robot-2.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(scan|odom|imu|joint_states|cmd_vel|tf|tf_static|map|plan|robot_description|goal_pose)|clock|ros_discovery_info|rosout)$"
        }
      }
    }

  # Viz pod: no namespace; tf_relay.py merges /robot_N/tf → /tf for RViz
  zenoh-viz.json5: |
    {
      mode: "client",
      connect: { endpoints: ["tcp/zenoh-router:7447"] },
      scouting: { multicast: { enabled: false } },
      plugins: {
        ros2dds: {
          allow: "^((robot_1|robot_2)/(map|scan|tf|tf_static|plan|robot_description|goal_pose)|clock|ros_discovery_info|rosout)$"
        }
      }
    }
