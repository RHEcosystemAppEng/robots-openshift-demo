apiVersion: v1
kind: ConfigMap
metadata:
  name: nav2-config
  namespace: robot-demo
  labels:
    app.kubernetes.io/name: robot-demo
data:
  slam_params.yaml: |
    slam_toolbox:
      ros__parameters:
        # Core frames and topics
        odom_frame: odom
        map_frame: map
        base_frame: base_footprint
        scan_topic: /scan
        mode: mapping
        # Solver
        solver_plugin: solver_plugins::CeresSolver
        ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
        ceres_preconditioner: SCHUR_JACOBI
        ceres_trust_strategy: LEVENBERG_MARQUARDT
        ceres_dogleg_type: TRADITIONAL_DOGLEG
        ceres_loss_function: None
        # Map settings
        resolution: 0.05
        max_laser_range: 3.5
        map_update_interval: 5.0
        transform_publish_period: 0.02
        transform_timeout: 0.5
        tf_buffer_duration: 30.0
        minimum_time_interval: 0.5
        throttle_scans: 1
        stack_size_to_use: 40000000
        debug_logging: false
  nav2_params.yaml: |
    lifecycle_manager_navigation:
      ros__parameters:
        use_sim_time: true
        autostart: true
        bond_timeout: 4.0
        node_names:
          - controller_server
          - smoother_server
          - planner_server
          - behavior_server
          - bt_navigator
          - waypoint_follower
          - velocity_smoother
        # docking_server, route_server, collision_monitor excluded —
        # they require additional plugins/databases not configured for this demo

    bt_navigator:
      ros__parameters:
        use_sim_time: true
        global_frame: map
        robot_base_frame: base_footprint
        odom_topic: /odom
        bt_loop_duration: 10
        default_server_timeout: 20
        navigators: ["navigate_to_pose", "navigate_through_poses"]
        navigate_to_pose:
          plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
        navigate_through_poses:
          plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    controller_server:
      ros__parameters:
        use_sim_time: true
        controller_frequency: 20.0
        min_x_velocity_threshold: 0.001
        min_y_velocity_threshold: 0.5
        min_theta_velocity_threshold: 0.001
        failure_tolerance: 0.3
        progress_checker_plugins: ["progress_checker"]
        goal_checker_plugins: ["general_goal_checker"]
        controller_plugins: ["FollowPath"]
        progress_checker:
          plugin: "nav2_controller::SimpleProgressChecker"
          required_movement_radius: 0.5
          movement_time_allowance: 10.0
        general_goal_checker:
          stateful: true
          plugin: "nav2_controller::SimpleGoalChecker"
          xy_goal_tolerance: 0.25
          yaw_goal_tolerance: 0.25
        FollowPath:
          plugin: "dwb_core::DWBLocalPlanner"
          min_vel_x: 0.0
          min_vel_y: 0.0
          max_vel_x: 0.26
          max_vel_y: 0.0
          max_vel_theta: 1.82
          min_speed_xy: 0.0
          max_speed_xy: 0.26
          min_speed_theta: 0.0
          acc_lim_x: 2.5
          acc_lim_y: 0.0
          acc_lim_theta: 3.2
          decel_lim_x: -2.5
          decel_lim_y: 0.0
          decel_lim_theta: -3.2
          vx_samples: 20
          vy_samples: 5
          vtheta_samples: 20
          sim_time: 1.7
          linear_granularity: 0.05
          angular_granularity: 0.025
          transform_tolerance: 0.2
          xy_goal_tolerance: 0.25
          trans_stopped_velocity: 0.25
          short_circuit_trajectory_evaluation: true
          stateful: true
          critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
          BaseObstacle.scale: 0.02
          PathAlign.scale: 32.0
          PathAlign.forward_point_distance: 0.1
          GoalAlign.scale: 24.0
          GoalAlign.forward_point_distance: 0.1
          PathDist.scale: 32.0
          GoalDist.scale: 24.0
          RotateToGoal.scale: 32.0
          RotateToGoal.slowing_factor: 5.0
          RotateToGoal.lookahead_time: -1.0
    local_costmap:
      local_costmap:
        ros__parameters:
          use_sim_time: true
          update_frequency: 5.0
          publish_frequency: 2.0
          global_frame: odom
          robot_base_frame: base_footprint
          rolling_window: true
          width: 3
          height: 3
          resolution: 0.05
          robot_radius: 0.22
          plugins: ["voxel_layer", "inflation_layer"]
          inflation_layer:
            plugin: "nav2_costmap_2d::InflationLayer"
            cost_scaling_factor: 3.0
            inflation_radius: 0.55
          voxel_layer:
            plugin: "nav2_costmap_2d::VoxelLayer"
            enabled: true
            publish_voxel_map: true
            origin_z: 0.0
            z_resolution: 0.05
            z_voxels: 16
            max_obstacle_height: 2.0
            mark_threshold: 0
            observation_sources: scan
            scan:
              topic: /scan
              max_obstacle_height: 2.0
              clearing: true
              marking: true
              data_type: "LaserScan"
              raytrace_max_range: 3.0
              raytrace_min_range: 0.0
              obstacle_max_range: 2.5
              obstacle_min_range: 0.0
          always_send_full_costmap: true
    global_costmap:
      global_costmap:
        ros__parameters:
          use_sim_time: true
          update_frequency: 1.0
          publish_frequency: 1.0
          global_frame: map
          robot_base_frame: base_footprint
          robot_radius: 0.22
          resolution: 0.05
          track_unknown_space: true
          transform_tolerance: 0.5
          plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
          obstacle_layer:
            plugin: "nav2_costmap_2d::ObstacleLayer"
            enabled: true
            observation_sources: scan
            scan:
              topic: /scan
              max_obstacle_height: 2.0
              clearing: true
              marking: true
              data_type: "LaserScan"
              raytrace_max_range: 3.0
              raytrace_min_range: 0.0
              obstacle_max_range: 2.5
              obstacle_min_range: 0.0
          static_layer:
            plugin: "nav2_costmap_2d::StaticLayer"
            map_subscribe_transient_local: true
          inflation_layer:
            plugin: "nav2_costmap_2d::InflationLayer"
            cost_scaling_factor: 3.0
            inflation_radius: 0.55
          always_send_full_costmap: true
    planner_server:
      ros__parameters:
        expected_planner_frequency: 20.0
        use_sim_time: true
        planner_plugins: ["GridBased"]
        GridBased:
          plugin: "nav2_navfn_planner::NavfnPlanner"
          tolerance: 0.5
          use_astar: false
          allow_unknown: true
    smoother_server:
      ros__parameters:
        use_sim_time: true
        smoother_plugins: ["simple_smoother"]
        simple_smoother:
          plugin: "nav2_smoother::SimpleSmoother"
          tolerance: 1.0e-10
          max_its: 1000
          do_refinement: true
    behavior_server:
      ros__parameters:
        cycle_frequency: 10.0
        behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
        spin:
          plugin: "nav2_behaviors::Spin"
        backup:
          plugin: "nav2_behaviors::BackUp"
        drive_on_heading:
          plugin: "nav2_behaviors::DriveOnHeading"
        wait:
          plugin: "nav2_behaviors::Wait"
        assisted_teleop:
          plugin: "nav2_behaviors::AssistedTeleop"
        local_frame: odom
        global_frame: map
        robot_base_frame: base_footprint
        transform_tolerance: 0.1
        use_sim_time: true
        simulate_ahead_time: 2.0
        max_rotational_vel: 1.0
        min_rotational_vel: 0.4
        rotational_acc_lim: 3.2
    velocity_smoother:
      ros__parameters:
        use_sim_time: true
        smoothing_frequency: 20.0
        scale_velocities: false
        feedback: "OPEN_LOOP"
        max_velocity: [0.26, 0.0, 1.82]
        min_velocity: [-0.26, 0.0, -1.82]
        max_accel: [2.5, 0.0, 3.2]
        max_decel: [-2.5, 0.0, -3.2]
        odom_topic: "odom"
        odom_duration: 0.1
        deadband_velocity: [0.0, 0.0, 0.0]
        velocity_timeout: 1.0
    waypoint_follower:
      ros__parameters:
        use_sim_time: true
        loop_rate: 20
        stop_on_failure: false
        action_server_result_timeout: 900.0
        waypoint_task_executor_plugin: "wait_at_waypoint"
        wait_at_waypoint:
          plugin: "nav2_waypoint_follower::WaitAtWaypoint"
          enabled: true
          waypoint_pause_duration: 200
    collision_monitor:
      ros__parameters:
        use_sim_time: true
        base_frame_id: "base_footprint"
        odom_frame_id: "odom"
        cmd_vel_in_topic: "cmd_vel_smoothed"
        cmd_vel_out_topic: "cmd_vel"
        state_topic: "collision_monitor_state"
        transform_tolerance: 0.2
        source_timeout: 1.0
        base_shift_correction: true
        stop_pub_timeout: 2.0
        polygons: ["FootprintApproach"]
        FootprintApproach:
          type: "polygon"
          action_type: "approach"
          footprint_topic: "/local_costmap/published_footprint"
          time_before_collision: 1.2
          simulation_time_step: 0.1
          min_points: 6
          visualize: false
          enabled: true
        observation_sources: ["scan"]
        scan:
          source_timeout: 0.2
          type: "scan"
          topic: "/scan"
          min_height: 0.15
          max_height: 2.0
          enabled: true
    docking_server:
      ros__parameters:
        use_sim_time: true
        controller_frequency: 50.0
        initial_perception_timeout: 5.0
        wait_charge_timeout: 5.0
        dock_approach_timeout: 30.0
        undock_linear_tolerance: 0.05
        undock_angular_tolerance: 0.1
        max_retries: 3
        base_frame: "base_link"
        fixed_frame: "odom"
        dock_backwards: false
        dock_prestaging_tolerance: 0.5
        dock_plugins: ["SimpleChargingDock"]
        SimpleChargingDock:
          plugin: "opennav_docking::SimpleChargingDock"
          docking_threshold: 0.05
          staging_x_offset: -0.7
          use_external_detection_pose: false
          use_battery_status: false

    route_server:
      ros__parameters:
        use_sim_time: true
        graph_filepath: ""
        operations: []
        route_server_id: "route_server"

    map_server:
      ros__parameters:
        use_sim_time: true
        yaml_filename: ""
    map_saver:
      ros__parameters:
        use_sim_time: true
        save_map_timeout: 5.0
        free_thresh_default: 0.25
        occupied_thresh_default: 0.65
        map_subscribe_transient_local: true
