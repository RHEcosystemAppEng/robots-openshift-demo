apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-viz
  namespace: robot-demo
  labels:
    app: robot-viz
    app.kubernetes.io/name: robot-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-viz
  template:
    metadata:
      labels:
        app: robot-viz
        app.kubernetes.io/name: robot-demo
    spec:
      serviceAccountName: robot-demo
      initContainers:
        - name: wait-for-zenoh
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z zenoh-router 7447; do sleep 2; done"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: viz
          image: quay.io/jianrzha/robot-demo-viz:latest
          command: ["/usr/local/bin/entrypoint-viz.sh"]
          ports:
            - containerPort: 6080
              name: novnc
          env:
            - name: HOME
              value: /tmp/ros-home
            - name: ROS_HOME
              value: /tmp/ros-home
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
            - name: DISPLAY
              value: ":99"
          volumeMounts:
            - name: ros-home
              mountPath: /tmp/ros-home
            - name: x11-unix
              mountPath: /tmp/.X11-unix
            - name: zenoh-config
              mountPath: /etc/zenoh
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            runAsUser: 1001
            runAsGroup: 0
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: 6080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 20

        - name: zenoh-bridge
          image: quay.io/ecosystem-appeng/zenoh-bridge-ros2dds:1.9.0
          args: ["--config", "/etc/zenoh/zenoh-viz.json5"]
          env:
            - name: RUST_LOG
              value: warn
            - name: ROS_DISTRO
              value: jazzy
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
          volumeMounts:
            - name: zenoh-config
              mountPath: /etc/zenoh
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: ros-home
          emptyDir: {}
        - name: x11-unix
          emptyDir:
            medium: Memory
        - name: zenoh-config
          configMap:
            name: zenoh-config
            items:
              - key: zenoh-viz.json5
                path: zenoh-viz.json5
