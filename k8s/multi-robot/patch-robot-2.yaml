# Robot 2 — new Deployment pair for a second TurtleBot3 Waffle.
# Spawns at (3.0, 3.0) facing south. Topics namespaced /robot_2/*.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gazebo-sim-robot-2
  namespace: robot-demo
  labels:
    app: gazebo-sim-robot-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gazebo-sim-robot-2
  template:
    metadata:
      labels:
        app: gazebo-sim-robot-2
    spec:
      serviceAccountName: robot-demo
      initContainers:
        - name: wait-for-zenoh
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z zenoh-router 7447; do sleep 2; done"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: gazebo
          image: quay.io/jianrzha/robot-demo-gazebo:latest
          command: ["/usr/local/bin/entrypoint-gazebo.sh"]
          env:
            - name: ROBOT_NAME
              value: robot_2
            - name: GZ_SPAWN_POSE_X
              value: "3.0"
            - name: GZ_SPAWN_POSE_Y
              value: "3.0"
            - name: GZ_SPAWN_POSE_THETA
              value: "3.14159"
            - name: HOME
              value: /tmp/ros-home
            - name: ROS_HOME
              value: /tmp/ros-home
            - name: GZ_HOME
              value: /tmp/ros-home
            - name: GZ_CACHE_PATH
              value: /tmp/ros-home/.gz
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: graphics,compute,utility
          ports:
            - containerPort: 8080
              name: gzweb
          volumeMounts:
            - name: ros-home
              mountPath: /tmp/ros-home
            - name: zenoh-config
              mountPath: /etc/zenoh
            - name: gz-bridge-config
              mountPath: /home/ros/gz-bridge
            - name: www-config
              mountPath: /home/ros/www
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
          securityContext:
            runAsUser: 1001
            runAsGroup: 0
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5

        - name: zenoh-bridge
          image: quay.io/ecosystem-appeng/zenoh-bridge-ros2dds:1.9.0
          args: ["--config", "/etc/zenoh/zenoh-gazebo.json5"]
          env:
            - name: RUST_LOG
              value: warn
            - name: ROS_DISTRO
              value: jazzy
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
          volumeMounts:
            - name: zenoh-config
              mountPath: /etc/zenoh
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: g5-gpu
          operator: Exists
          effect: NoSchedule
        - key: g6e-gpu
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: ros-home
          emptyDir: {}
        - name: zenoh-config
          configMap:
            name: zenoh-config
            items:
              - key: zenoh-gazebo-robot-2.json5
                path: zenoh-gazebo.json5
        - name: gz-bridge-config
          configMap:
            name: gz-bridge-config
        - name: www-config
          configMap:
            name: www-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-nav-robot-2
  namespace: robot-demo
  labels:
    app: robot-nav-robot-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-nav-robot-2
  template:
    metadata:
      labels:
        app: robot-nav-robot-2
    spec:
      serviceAccountName: robot-demo
      initContainers:
        - name: wait-for-zenoh
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z zenoh-router 7447; do sleep 2; done"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: nav2
          image: quay.io/jianrzha/robot-demo-nav2:latest
          command: ["/usr/local/bin/entrypoint-nav2.sh"]
          env:
            - name: ROBOT_NAME
              value: robot_2
            - name: HOME
              value: /tmp/ros-home
            - name: ROS_HOME
              value: /tmp/ros-home
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
          volumeMounts:
            - name: ros-home
              mountPath: /tmp/ros-home
            - name: nav2-config
              mountPath: /home/ros/nav2
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            runAsUser: 1001
            runAsGroup: 0
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

        - name: zenoh-bridge
          image: quay.io/ecosystem-appeng/zenoh-bridge-ros2dds:1.9.0
          args: ["--config", "/etc/zenoh/zenoh-nav2.json5"]
          env:
            - name: RUST_LOG
              value: warn
            - name: ROS_DISTRO
              value: jazzy
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
          volumeMounts:
            - name: zenoh-config
              mountPath: /etc/zenoh
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: ros-home
          emptyDir: {}
        - name: nav2-config
          configMap:
            name: nav2-config
        - name: zenoh-config
          configMap:
            name: zenoh-config
            items:
              - key: zenoh-nav2-robot-2.json5
                path: zenoh-nav2.json5
