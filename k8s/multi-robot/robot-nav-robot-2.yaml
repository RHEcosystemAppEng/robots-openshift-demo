apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-nav-robot-2
  namespace: robot-demo
  labels:
    app: robot-nav-robot-2
    app.kubernetes.io/name: robot-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-nav-robot-2
  template:
    metadata:
      labels:
        app: robot-nav-robot-2
        app.kubernetes.io/name: robot-demo
    spec:
      serviceAccountName: robot-demo
      initContainers:
        - name: wait-for-zenoh
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z zenoh-router 7447; do echo 'waiting for zenoh-router...'; sleep 2; done; echo 'zenoh-router is ready'"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: nav2
          image: quay.io/jianrzha/robot-demo-nav2:latest
          command: ["/usr/local/bin/entrypoint-nav2.sh"]
          env:
            - name: ROBOT_NAME
              value: robot_2
            - name: ROBOT_MODEL
              value: turtlebot3_waffle_2
            - name: SLAM_INITIAL_X
              value: "6.0"
            - name: SLAM_INITIAL_Y
              value: "6.0"
            - name: SLAM_INITIAL_YAW
              value: "3.14159"
            - name: HOME
              value: /tmp/ros-home
            - name: ROS_HOME
              value: /tmp/ros-home
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
          volumeMounts:
            - name: ros-home
              mountPath: /tmp/ros-home
            - name: nav2-config
              mountPath: /home/ros/nav2
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 6Gi
          securityContext:
            runAsUser: 1001
            runAsGroup: 0
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            exec:
              command: ["bash", "-c", "source /usr/lib64/ros-jazzy/setup.bash && ros2 node list 2>/dev/null | grep -q slam_toolbox"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20

        - name: zenoh-bridge
          image: quay.io/ecosystem-appeng/zenoh-bridge-ros2dds:1.9.0
          args: ["--config", "/etc/zenoh/zenoh-nav2.json5"]
          env:
            - name: RUST_LOG
              value: warn
            - name: ROS_DISTRO
              value: jazzy
            - name: ROS_AUTOMATIC_DISCOVERY_RANGE
              value: LOCALHOST
            - name: RMW_IMPLEMENTATION
              value: rmw_cyclonedds_cpp
          volumeMounts:
            - name: zenoh-config
              mountPath: /etc/zenoh
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: ros-home
          emptyDir: {}
        - name: nav2-config
          configMap:
            name: nav2-config
        - name: zenoh-config
          configMap:
            name: zenoh-config
            items:
              - key: zenoh-nav2-robot-2.json5
                path: zenoh-nav2.json5
